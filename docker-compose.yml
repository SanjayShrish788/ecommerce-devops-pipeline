version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ecomm-mysql
    environment:
      MYSQL_DATABASE: ecommjava
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - ecomm-net

  app:
    build: .
    container_name: ecomm-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecomm-net

networks:
  ecomm-net:
    driver: bridge

volumes:
  mysql-data:
