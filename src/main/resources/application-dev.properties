# Dev profile — uses H2 in-memory database for local development without MySQL.
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
spring.datasource.url=jdbc:h2:mem:ecommdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.thymeleaf.cache=false
server.port=8080

# H2 web console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
