<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login — E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">E-Commerce</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3 class="text-center mb-4">Login</h3>

                    <!-- BUG FIX: Success message after registration was never shown -->
                    <div th:if="${param.registered}" class="alert alert-success">
                        ✅ Account created successfully! You can now log in.
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger">
                        ❌ Invalid username or password. Please try again.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success">
                        👋 You have been logged out successfully.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 input-group">
                            <span class="input-group-text">👤</span>
                            <input type="text" class="form-control" name="username" placeholder="Username" required autocomplete="username">
                        </div>
                        <div class="mb-3 input-group">
                            <span class="input-group-text">🔒</span>
                            <input type="password" class="form-control" name="password" placeholder="Password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/register">Don't have an account? <strong>Sign up here</strong></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
