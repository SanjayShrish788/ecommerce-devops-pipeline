<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">E-Commerce</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/shop">Products</a></li>
                    
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" href="/cart">Cart</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-link nav-link">Logout</button>
                        </form>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 class="text-center">Welcome to Perishable Shop</h2>
        <h4 class="text-center text-muted mb-5" th:text="'Welcome ' + ${username}"></h4>
        
        <div class="row">
            <div class="col-md-4 mb-4" th:each="product : ${products}">
                <div class="card h-100">
                    <img th:if="${product.image != null && !product.image.isEmpty()}" th:src="${product.image}" class="card-img-top product-img" alt="Product Image">
                    <img th:if="${product.image == null || product.image.isEmpty()}" src="https://via.placeholder.com/300x200?text=No+Image" class="card-img-top product-img" alt="Placeholder">
                    <div class="card-body text-center">
                        <h5 class="card-title" th:text="${product.name}"></h5>
                        <p class="text-muted" th:text="${product.category != null ? product.category.name : 'Uncategorized'}"></p>
                        <h4 th:text="'$' + ${product.price}"></h4>
                        <p class="card-text" th:text="${product.description}"></p>
                    </div>
                    <div class="card-footer bg-white border-0 text-center mb-3">
                        <a th:href="@{/cart/add/{id}(id=${product.productId})}" class="btn btn-warning w-100" sec:authorize="isAuthenticated()">Add to Cart</a>
                        <a href="/login" class="btn btn-warning w-100" sec:authorize="!isAuthenticated()">Login to Add</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 p-4 bg-light">
        © 2023 Perishable Shop. All rights reserved.
    </footer>
</body>
</html>
