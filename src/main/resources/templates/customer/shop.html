<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Shop — E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">E-Commerce</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="/shop">Products</a></li>

                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" href="/cart">🛒 Cart</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-link nav-link">Logout</button>
                        </form>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" href="/register">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center shop-title">Our Products</h1>
        <p class="text-center text-muted mb-5" th:text="'Welcome, ' + ${username} + '!'"></p>

        <div class="row g-4">
            <div class="col-md-4 col-sm-6" th:each="product : ${products}">
                <div class="card h-100 product-card">
                    <!-- Product Image -->
                    <img th:if="${product.image != null and !product.image.isEmpty()}"
                         th:src="${product.image}"
                         class="card-img-top product-img"
                         alt="Product Image">
                    <img th:if="${product.image == null or product.image.isEmpty()}"
                         src="https://via.placeholder.com/300x200?text=No+Image"
                         class="card-img-top product-img"
                         alt="Placeholder">

                    <div class="card-body text-center d-flex flex-column">
                        <!-- Stock status badge -->
                        <span th:if="${product.quantity > 0}"
                              class="badge bg-success mb-2 align-self-center">In Stock</span>
                        <span th:if="${product.quantity <= 0}"
                              class="badge bg-danger mb-2 align-self-center">Out of Stock</span>

                        <p class="text-muted small mb-1"
                           th:text="${product.category != null ? product.category.name : 'Uncategorized'}"></p>
                        <h5 class="card-title" th:text="${product.name}"></h5>
                        <p class="card-text text-muted small" th:text="${product.description}"></p>
                        <h4 class="mt-auto product-price" th:text="'₹' + ${product.price}"></h4>
                    </div>

                    <div class="card-footer bg-white border-0 text-center pb-3">
                        <!-- Authenticated user with stock available: add to cart -->
                        <a th:if="${product.quantity > 0}"
                           th:href="@{/cart/add/{id}(id=${product.productId})}"
                           class="btn btn-warning w-100"
                           sec:authorize="isAuthenticated()">
                            🛒 Add to Cart
                        </a>
                        <!-- Out of stock -->
                        <button th:if="${product.quantity <= 0}"
                                class="btn btn-secondary w-100" disabled>
                            Out of Stock
                        </button>
                        <!-- Not logged in -->
                        <a href="/login" class="btn btn-outline-warning w-100" sec:authorize="!isAuthenticated()">
                            Login to Buy
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="text-center mt-5">
            <p class="text-muted">No products available yet. Check back soon!</p>
        </div>
    </div>

    <footer class="text-center mt-5 p-4 bg-light">
        © 2024 E-Commerce Shop. All rights reserved.
    </footer>
</body>
</html>
