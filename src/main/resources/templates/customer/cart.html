<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">E-Commerce</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/shop">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/cart">Cart</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-link nav-link">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Your Cart</h2>
        <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info mt-3">
            Your cart is empty. <a href="/shop">Go Shopping!</a>
        </div>
        <table class="table table-bordered mt-3" th:if="${!#lists.isEmpty(cartItems)}">
            <thead class="table-dark">
                <tr>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.product.name}"></td>
                    <td th:text="'$' + ${item.product.price}"></td>
                    <td th:text="${item.product.description}"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <footer class="text-center mt-5 p-4 bg-light">
        © 2023 Perishable Shop. All rights reserved.
    </footer>
</body>
</html>
