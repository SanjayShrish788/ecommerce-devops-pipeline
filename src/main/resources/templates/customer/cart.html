<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Cart — E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">E-Commerce</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/shop">Products</a></li>
                <li class="nav-item"><a class="nav-link active" href="/cart">🛒 Cart</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-link nav-link">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>🛒 Your Cart</h2>

        <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info mt-4">
            Your cart is empty. <a href="/shop" class="alert-link">Go Shopping!</a>
        </div>

        <div th:if="${!#lists.isEmpty(cartItems)}">
            <table class="table table-bordered mt-3 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Product</th>
                        <th>Unit Price</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <img th:if="${item.product.image != null and !item.product.image.isEmpty()}"
                                     th:src="${item.product.image}"
                                     alt="Product"
                                     style="width:50px;height:50px;object-fit:cover;border-radius:6px;">
                                <span th:text="${item.product.name}"></span>
                            </div>
                        </td>
                        <td th:text="'₹' + ${item.product.price}"></td>
                        <td th:text="${item.quantity}"></td>
                        <!-- Subtotal = unit price × quantity -->
                        <td th:text="'₹' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
                        <td>
                            <!-- BUG FIX: Remove from cart button was completely missing -->
                            <a th:href="@{/cart/remove/{id}(id=${item.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Remove this item from your cart?')">
                                🗑 Remove
                            </a>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-light fw-bold">
                        <td colspan="3" class="text-end">Order Total:</td>
                        <td colspan="2" th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></td>
                    </tr>
                </tfoot>
            </table>

            <div class="d-flex justify-content-between mt-3">
                <a href="/shop" class="btn btn-outline-secondary">← Continue Shopping</a>
                <button class="btn btn-success">Checkout (Coming Soon)</button>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 p-4 bg-light">
        © 2024 E-Commerce Shop. All rights reserved.
    </footer>
</body>
</html>
