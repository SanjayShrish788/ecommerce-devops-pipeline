<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">Admin Dashboard</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home Page</a></li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-link nav-link">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row text-center">
            <div class="col-md-4">
                <div class="card dashboard-card p-4 mb-4">
                    <h3>Categories</h3>
                    <h2 th:text="${categoryCount}">0</h2>
                    <a href="/admin/categories" class="btn btn-primary mt-3">Manage</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card dashboard-card p-4 mb-4">
                    <h3>Products</h3>
                    <h2 th:text="${productCount}">0</h2>
                    <a href="/admin/products" class="btn btn-primary mt-3">Manage</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card dashboard-card p-4 mb-4">
                    <h3>Customers</h3>
                    <h2 th:text="${customerCount}">0</h2>
                    <a href="/admin/customers" class="btn btn-primary mt-3">Manage</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
