<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add/Update Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">Admin Dashboard</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/products">Back to Products</a></li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h3 class="text-center" th:text="${product.productId == null ? 'Add Product' : 'Update Product'}">Add Product</h3>
                    <form th:action="@{/admin/products/add}" th:object="${product}" method="post">
                        <input type="hidden" th:field="*{productId}">
                        
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Select Category</label>
                            <select class="form-control" th:field="*{category.categoryId}" required>
                                <option value="" disabled selected>Select Category</option>
                                <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}"></option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Weight in grams</label>
                            <input type="number" class="form-control" th:field="*{weight}">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Available Quantity</label>
                            <input type="number" class="form-control" th:field="*{quantity}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Product Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Product Image (URL)</label>
                            <input type="text" class="form-control" th:field="*{image}">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
