<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add/Update Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">Admin Dashboard</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/products">Back to Products</a></li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h3 class="text-center" th:text="${product.productId == null ? 'Add Product' : 'Update Product'}">Add Product</h3>

                    <!--
                        BUG FIX: The form action now correctly switches between
                        /admin/products/add (new) and /admin/products/update/{id} (edit).
                        Previously it always posted to /add, so "Update" silently created
                        a new duplicate product every time.
                    -->
                    <form th:action="${product.productId == null ? '/admin/products/add' : '/admin/products/update/' + product.productId}"
                          th:object="${product}" method="post">
                        <input type="hidden" th:field="*{productId}">

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>

                        <!--
                            BUG FIX: Category binding. The select binds to category.categoryId
                            (a nested Long). Spring MVC creates a transient Category with only the ID set.
                            The AdminController.resolveCategory() then fetches the managed entity
                            from the DB before saving, preventing a TransientPropertyValueException.
                        -->
                        <div class="mb-3">
                            <label class="form-label">Select Category</label>
                            <select class="form-select" th:field="*{category.categoryId}" required>
                                <option value="" disabled>Select Category</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.categoryId}"
                                        th:text="${cat.name}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" step="0.01" min="0" class="form-control" th:field="*{price}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Weight in grams</label>
                            <input type="number" min="0" class="form-control" th:field="*{weight}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Available Quantity</label>
                            <input type="number" min="0" class="form-control" th:field="*{quantity}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Product Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Product Image (URL)</label>
                            <input type="text" class="form-control" th:field="*{image}" placeholder="https://...">
                            <div class="form-text">Paste a direct image URL. Leave blank to use a placeholder.</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100"
                                th:text="${product.productId == null ? 'Add Product' : 'Update Product'}">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
