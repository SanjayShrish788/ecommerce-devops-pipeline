<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">Admin Dashboard</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/products/add">Add Product</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Back</a></li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5">
        <h2>Products</h2>
        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Serial No</th>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Preview</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Weight</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product, iterStat : ${products}">
                    <td th:text="${iterStat.count}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.category != null ? product.category.name : 'N/A'}"></td>
                    <td>
                        <img th:if="${product.image != null && !product.image.isEmpty()}" th:src="${product.image}" alt="Preview" width="50" height="50">
                    </td>
                    <td th:text="${product.quantity}"></td>
                    <td th:text="'₹' + ${product.price}"></td>
                    <td th:text="${product.weight}"></td>
                    <td th:text="${product.description}"></td>
                    <td>
                        <a th:href="@{/admin/products/update/{id}(id=${product.productId})}" class="btn btn-warning btn-sm">Update</a>
                        <a th:href="@{/admin/products/delete/{id}(id=${product.productId})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
