spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ecommjava?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.thymeleaf.cache=false
server.port=8080

# Disable Open Session in View to prevent lazy-loading anti-patterns.
# All data needed by templates must be loaded in the service/controller layer.
spring.jpa.open-in-view=false
